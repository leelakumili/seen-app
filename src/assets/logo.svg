<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#243d73"/>
  <!-- Outer eye — wide pointed almond -->
  <path
    d="M3 16 C7 9, 25 9, 29 16 C25 23, 7 23, 3 16 Z"
    stroke="#c9924a"
    stroke-width="1.4"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Iris outer ring -->
  <circle cx="16" cy="16" r="5.2" stroke="#c9924a" stroke-width="1.4" fill="none"/>
  <!-- Iris warm fill -->
  <circle cx="16" cy="16" r="5.2" fill="#c9924a" fill-opacity="0.10"/>
  <!-- Iris inner detail ring -->
  <circle cx="16" cy="16" r="3.3" stroke="#c9924a" stroke-width="0.7" stroke-opacity="0.55" fill="none"/>
  <!-- Pupil — dark navy -->
  <circle cx="16" cy="16" r="2.1" fill="#111e3d"/>
  <!-- Catchlight -->
  <circle cx="17.2" cy="14.8" r="0.65" fill="#f5f0e6" fill-opacity="0.75"/>
</svg>
