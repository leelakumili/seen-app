name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
      release_note:
        description: "What's changed (single line summary)"
        required: false

permissions:
  contents: write

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Check actor is authorized
        run: |
          ALLOWED_ACTORS="leelakumili"
          if echo "$ALLOWED_ACTORS" | grep -qw "${{ github.actor }}"; then
            echo "Actor ${{ github.actor }} is authorized."
          else
            echo "::error::Actor ${{ github.actor }} is not authorized to run the release workflow."
            exit 1
          fi

  release:
    needs: authorize
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: '*.dmg'
          - os: windows-latest
            artifact: '*.exe'
          - os: ubuntu-latest
            artifact: '*.deb'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af68 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version
        run: npm version ${{ inputs.version }} --no-git-tag-version  

      - name: Build and package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set these secrets in your repo to sign the macOS build
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build

      - name: Upload release artifacts
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09581f450a276ba8c # v2.1.0
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ inputs.release_note }}
          files: release/${{ matrix.artifact }}
          draft: false
          generate_release_notes: true
